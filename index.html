<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChefVirtual - Recetas del Mundo</title>
    <link rel="stylesheet" href="./estilos.css">
</head>
<body>

    <header class="cabecera">
        <h1>🍳 ChefVirtual</h1>
        <form id="formulario-busqueda" class="contenedor-busqueda">
            <input type="text" id="entrada-busqueda" placeholder="Ej: Chicken, Pasta, Apple..." required>
            <button type="submit">Search</button>
        </form>
        
        <div class="sugerencias">
            <p>Suggestions</p>
            <div id="botones-sugerencias">
                <button onclick="buscarRecetas('Chicken')">Chicken</button>
                <button onclick="buscarRecetas('Beef')">Beef</button>
                <button onclick="buscarRecetas('Seafood')">Seafood</button>
                <button onclick="buscarRecetas('Dessert')">Dessert</button>
            </div>
        </div>
    </header>

    <main id="contenedor-principal">
        <div id="mensaje-estado" class="oculto"></div>
        <section id="rejilla-resultados" class="rejilla-recetas"></section>

        <!-- Modal de Detalle -->
        <div id="modal-detalle" class="modal oculto">
            <div class="contenido-modal">
                <button id="cerrar-modal" class="boton-cerrar">&times;</button>
                <div id="cuerpo-detalle"></div>
            </div>
        </div>
    </main>

    <footer class="pie-pagina">
        <p>&copy; 2024 Proyecto API Comida - Programación Web</p>
    </footer>

    <script src="./main.js"></script>
</body>
</html>
